name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
      - name: Build Typst site
        run: make html
        working-directory: typst_site
      - name: Validate build artifact
        run: |
          set -euo pipefail
          test -d typst_site/_site
          test -f typst_site/_site/index.html
          test -s typst_site/_site/index.html
          # Ensure the artifact is not effectively empty.
          [ "$(find typst_site/_site -mindepth 1 | wc -l)" -gt 1 ]
          touch typst_site/_site/.nojekyll
          ls -la typst_site/_site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: typst_site/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
